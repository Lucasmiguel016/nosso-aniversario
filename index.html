<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nossa História - 1 Ano</title>
    <style>
        :root {
            --primary-color: #ff4d6d;
            --bg-color: #fff0f3;
            --text-color: #590d22;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            overflow-x: hidden;
            text-align: center;
        }

        /* Container dos Corações */
        #heart-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 999;
        }

        .heart {
            position: absolute;
            color: var(--primary-color);
            font-size: 20px;
            animation: fall linear forwards;
        }

        @keyframes fall {
            to { transform: translateY(100vh) rotate(360deg); }
        }

        /* Seções */
        section {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
            box-sizing: border-box;
        }

        .photo-frame {
            width: 85vw;
            max-width: 300px;
            border: 10px solid white;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
            border-radius: 5px;
            transform: rotate(-3deg);
            margin-bottom: 20px;
        }

        h1 { font-size: 2.5rem; color: var(--primary-color); }
        p { font-size: 1.2rem; line-height: 1.6; }

        .btn-music {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: var(--primary-color);
            color: white;
            border: none;
            padding: 15px;
            border-radius: 50%;
            cursor: pointer;
            z-index: 1000;
        }
    </style>
</head>
<body>

    <div id="heart-container"></div>

    <button class="btn-music" onclick="toggleMusic()">🎵</button>
    <audio id="bg-music" loop>
        <source src="sua-musica.mp3" type="audio/mpeg">
    </audio>

    <section>
        <h1>1 Ano de Nós ❤️</h1>
        <p>Arraste para baixo para ver nossa história...</p>
    </section>

    <section>
        <img src="foto1.jpg" class="photo-frame" alt="Nosso começo">
        <h2>Onde tudo começou...</h2>
        <p>"Aquele dia em que percebi que era você."</p>
    </section>

    <section>
        <img src="foto2.jpg" class="photo-frame" style="transform: rotate(3deg);" alt="Momento especial">
        <h2>365 dias depois</h2>
        <p>"E o meu 'sim' continua sendo seu todos os dias."</p>
    </section>

    <section>
        <h2>Para o futuro...</h2>
        <p>Mal posso esperar pelos próximos anos ao seu lado. Te amo!</p>
    </section>

    <script>
        // Função para criar corações caindo
        function createHeart() {
            const container = document.getElementById('heart-container');
            const heart = document.createElement('div');
            heart.classList.add('heart');
            heart.innerHTML = '❤️';
            heart.style.left = Math.random() * 100 + 'vw';
            heart.style.animationDuration = Math.random() * 3 + 2 + 's';
            heart.style.opacity = Math.random();
            container.appendChild(heart);

            setTimeout(() => { heart.remove(); }, 5000);
        }

        setInterval(createHeart, 300);

        // Lógica da Música
        const music = document.getElementById('bg-music');
        function toggleMusic() {
            if (music.paused) { music.play(); } 
            else { music.pause(); }
        }
    </script>
</body>
</html>
