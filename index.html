<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spotify - Nosso Momento</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --spotify-bg: #8b0000; /* Cor vinho do seu print */
            --spotify-black: #121212;
            --text-main: #ffffff;
            --text-sub: #b3b3b3;
        }

        body, html {
            margin: 0;
            padding: 0;
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            background-color: var(--spotify-bg);
            color: var(--text-main);
            overflow-x: hidden;
        }

        /* TELA INICIAL */
        #intro-screen {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            background: linear-gradient(transparent, rgba(0,0,0,0.8)), var(--spotify-bg);
            padding: 20px;
        }

        .intro-text {
            font-size: 1.5rem;
            font-weight: bold;
            margin-bottom: 30px;
            line-height: 1.4;
        }

        .btn-start {
            background-color: #fff;
            color: #000;
            padding: 15px 40px;
            border-radius: 30px;
            font-weight: bold;
            text-transform: uppercase;
            border: none;
            cursor: pointer;
            transition: 0.3s;
        }

        /* TELA DO PLAYER */
        #player-screen {
            display: none; /* Escondido no início */
            padding: 20px;
            animation: fadeIn 1s ease-in;
        }

        .top-phrase {
            font-size: 1rem;
            margin: 20px 0;
            font-weight: 500;
            text-align: center;
        }

        .main-card {
            width: 100%;
            max-width: 350px;
            margin: 0 auto;
        }

        .cover-art {
            width: 100%;
            aspect-ratio: 1/1;
            border-radius: 8px;
            object-fit: cover;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .song-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 20px;
            text-align: left;
        }

        .song-title { font-size: 1.4rem; font-weight: bold; margin: 0; }
        .artist-name { color: var(--text-sub); margin: 5px 0; }

        /* CONTROLES */
        .progress-bar {
            width: 100%;
            height: 4px;
            background: rgba(255,255,255,0.2);
            border-radius: 2px;
            margin: 25px 0 10px;
            position: relative;
        }
        .progress-current {
            width: 45%; /* Progresso visual */
            height: 100%;
            background: #fff;
            border-radius: 2px;
        }
        .time-info {
            display: flex;
            justify-content: space-between;
            font-size: 0.7rem;
            color: var(--text-sub);
        }

        .controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: 20px 0;
            font-size: 1.5rem;
        }
        .play-btn {
            font-size: 3.5rem;
        }

        /* SOBRE O CASAL */
        .about-card {
            background: rgba(255,255,255,0.1);
            border-radius: 12px;
            padding: 15px;
            margin-top: 40px;
            display: flex;
            align-items: center;
            text-align: left;
        }
        .about-img {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            object-fit: cover;
            margin-right: 15px;
        }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

    <div id="intro-screen">
        <div class="intro-text">
            Lucas separou um presente especial!<br>
            Um momento único feito com muito carinho.
        </div>
        <button class="btn-start" onclick="mostrarPresente()">Ver Presente</button>
    </div>

    <div id="player-screen">
        <div class="top-phrase">Eu te amo mais que tudo! ❤️</div>

        <div class="main-card">
            <img src="imagens/imagens/capa.JPEG" class="cover-art" alt="Nossa Foto">
            
            <div class="song-info">
                <div>
                    <p class="song-title">Sonha Comigo</p> 
                    <p class="artist-name">Zé Neto e Cristiano</p>
                </div>
                <i class="fa-solid fa-circle-check" style="color: #1ed760; font-size: 1.5rem;"></i>
            </div>

            <div class="progress-bar">
                <div class="progress-current"></div>
            </div>
            <div class="time-info">
                <span>1:12</span>
                <span>-3:65</span>
            </div>

            <div class="controls">
                <i class="fa-solid fa-shuffle" style="color: var(--text-sub); font-size: 1.2rem;"></i>
                <i class="fa-solid fa-backward-step"></i>
                <i class="fa-solid fa-circle-play play-btn"></i>
                <i class="fa-solid fa-forward-step"></i>
                <i class="fa-solid fa-repeat" style="color: var(--text-sub); font-size: 1.2rem;"></i>
            </div>

            <div class="about-card">
                <img src="imagens/imagens/casal_perfil.JPEG" class="about-img">
                <div>
                    <strong style="display: block; font-size: 1.1rem;">Sobre o casal</strong>
                    <span style="font-size: 0.9rem; color: var(--text-sub);">Cada detalhe importa quando estou com você.</span>
                </div>
            </div>
        </div>
    </div>

    <script>
        function mostrarPresente() {
            document.getElementById('intro-screen').style.display = 'none';
            document.getElementById('player-screen').style.display = 'block';
            window.scrollTo(0, 0);
        }
    </script>
</body>
</html>
